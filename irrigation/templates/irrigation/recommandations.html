<!DOCTYPE html>
<html>
<head>
    <title>Recommandations d'irrigation</title>
</head>
<body>

<h1>🌱 Recommandations d'irrigation</h1>

<table border="1">
    <tr>
        <th>Parcelle</th>
        <th>ET0</th>
        <th>Kc</th>
        <th>ETc</th>
        <th>Décision</th>
    </tr>

    {% for resultat in resultats %}
    <tr>
        <td>{{ resultat.parcelle }}</td>
        <td>{{ resultat.eto }}</td>
        <td>{{ resultat.kc }}</td>
        <td>{{ resultat.etc }}</td>
        <td>{{ resultat.decision }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">Aucune donnée disponible.</td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/">🏠 Retour au Dashboard</a>

</body>
</html>
