<!DOCTYPE html>
<html>
<head>
    <title>Smart Irrigation Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f4f7f9;
            margin:40px;
        }

        h1{
            color:#2e7d32;
        }

        .cards{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            padding:20px;
            width:220px;
            border-radius:10px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .number{
            font-size:35px;
            font-weight:bold;
            color:#2e7d32;
        }
    </style>

</head>
<body>
    <nav style="margin-bottom:30px;">
    <a href="/" style="margin-right:20px;">🏠 Dashboard</a>

    <a href="/parcelles/" style="margin-right:20px;">📍 Parcelles</a>

    <a href="/cultures/" style="margin-right:20px;">🌾 Cultures</a>

    <a href="/irrigations/" style="margin-right:20px;">💧 Irrigations</a>

    <a href="/meteos/" style="margin-right:20px;">🌤️ Météo</a>

    <a href="/recommandations/">🌱 Recommandations</a>
</nav>
    <h1>🌱 Smart Irrigation Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h3>📍 Parcelles</h3>
            <div class="number">{{ parcelles }}</div>
        </div>

        <div class="card">
            <h3>🌾 Cultures</h3>
            <div class="number">{{ cultures }}</div>
        </div>

        <div class="card">
            <h3>💧 Irrigations</h3>
            <div class="number">{{ irrigations }}</div>
        </div>

        <div class="card">
            <h3>🌤️ Météo</h3>
            <div class="number">{{ meteo }}</div>
        </div>

    </div>
<br><br>

<a href="/parcelles/">Voir toutes les parcelles</a>
<br><br>

<a href="/">🏠 Retour au Dashboard</a>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<canvas id="dashboardChart" width="400" height="150"></canvas>

<script>
const ctx = document.getElementById('dashboardChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Parcelles', 'Cultures', 'Irrigations', 'Météo'],
        datasets: [{
            label: 'Nombre',
            data: [
                {{ parcelles }},
                {{ cultures }},
                {{ irrigations }},
                {{ meteo }}
            ]
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>
</body>
</html>
