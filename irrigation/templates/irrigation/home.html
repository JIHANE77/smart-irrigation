<!DOCTYPE html>
<html>
<head>
    <title>Smart Irrigation Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f4f7f9;
            margin:40px;
        }

        h1{
            color:#2e7d32;
        }

        .cards{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            padding:20px;
            width:220px;
            border-radius:10px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .number{
            font-size:35px;
            font-weight:bold;
            color:#2e7d32;
        }
    </style>

</head>
<body>

    <h1>🌱 Smart Irrigation Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h3>📍 Parcelles</h3>
            <div class="number">{{ parcelles }}</div>
        </div>

        <div class="card">
            <h3>🌾 Cultures</h3>
            <div class="number">{{ cultures }}</div>
        </div>

        <div class="card">
            <h3>💧 Irrigations</h3>
            <div class="number">{{ irrigations }}</div>
        </div>

        <div class="card">
            <h3>🌤️ Météo</h3>
            <div class="number">{{ meteo }}</div>
        </div>

    </div>

</body>
</html>
