<h1 class="text-center mb-4">💧 Liste des irrigations</h1>
<div class="container mt-5"> 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<table class="table table-striped table-bordered table-hover shadow">
    <tr>
        <th>Parcelle</th>
        <th>Date</th>
        <th>Volume</th>
        <th>Durée</th>
        <th>Actions</th>
    </tr>

    {% for irrigation in irrigations %}
    <tr>
        <td>{{ irrigation.parcelle }}</td>
        <td>{{ irrigation.date }}</td>
        <td>{{ irrigation.volume }}</td>
        <td>{{ irrigation.duree }}</td>

        <td>
          <a href="/modifier-irrigation/{{ irrigation.id }}/"
   class="btn btn-primary btn-sm">
    ✏️ Modifier
</a>

<a href="/supprimer-irrigation/{{ irrigation.id }}/"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Voulez-vous vraiment supprimer irrigation ?')">
  🗑️ Supprimer
</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/ajouter-irrigation/" class="btn btn-success mb-3">
    ➕ Ajouter une irrigation
</a>
<a href="/" class="btn btn-secondary mt-3">
    🏠 Retour au Dashboard
</a>
</div>
